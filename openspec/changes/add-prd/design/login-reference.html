<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be.run 登录界面 - 设计参考</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="min-h-screen gradient-bg flex items-center justify-center p-4">
    <!-- 登录卡片 -->
    <div class="glass-card w-full max-w-[420px] rounded-2xl shadow-2xl p-10">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-xl mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Be.run</h1>
        </div>

        <!-- 标题 -->
        <h2 class="text-2xl font-bold text-gray-900 text-center mb-6">欢迎回来</h2>

        <!-- 登录方式切换 -->
        <div class="flex border-b border-gray-200 mb-6">
            <button class="flex-1 pb-3 text-sm font-semibold text-indigo-600 border-b-2 border-indigo-600">
                验证码登录
            </button>
            <button class="flex-1 pb-3 text-sm font-medium text-gray-500 hover:text-gray-700">
                密码登录
            </button>
        </div>

        <!-- 表单 -->
        <form class="space-y-5">
            <!-- 邮箱输入 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    邮箱地址
                </label>
                <input 
                    type="email" 
                    placeholder="请输入邮箱地址"
                    class="w-full h-11 px-4 rounded-lg border border-gray-300 focus:border-indigo-500 focus:ring-3 focus:ring-indigo-500/10 outline-none transition-all text-gray-900 placeholder-gray-400"
                >
            </div>

            <!-- 验证码输入 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    验证码
                </label>
                <div class="flex gap-3">
                    <input 
                        type="text" 
                        placeholder="请输入6位验证码"
                        maxlength="6"
                        class="flex-1 h-11 px-4 rounded-lg border border-gray-300 focus:border-indigo-500 focus:ring-3 focus:ring-indigo-500/10 outline-none transition-all text-gray-900 placeholder-gray-400"
                    >
                    <button 
                        type="button"
                        class="h-11 px-4 rounded-lg bg-gray-100 text-indigo-600 font-medium text-sm hover:bg-gray-200 transition-colors whitespace-nowrap"
                    >
                        获取验证码
                    </button>
                </div>
            </div>

            <!-- 登录按钮 -->
            <button 
                type="submit"
                class="w-full h-11 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 active:bg-indigo-800 transition-colors"
            >
                登录
            </button>
        </form>

        <!-- 错误提示示例 -->
        <div class="mt-4 p-3 rounded-lg bg-red-50 border border-red-200 flex items-start gap-2 hidden">
            <svg class="w-5 h-5 text-red-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span class="text-sm text-red-700">请输入有效的邮箱地址</span>
        </div>

        <!-- 版权信息 -->
        <p class="mt-8 text-center text-xs text-gray-500">
            © 2026 Be.run. All rights reserved
        </p>
    </div>

    <!-- 标注说明 -->
    <div class="fixed right-4 top-4 bg-white/90 backdrop-blur rounded-lg p-4 shadow-lg max-w-xs text-sm">
        <h3 class="font-semibold mb-2">设计参考说明</h3>
        <ul class="space-y-1 text-gray-600">
            <li>• 卡片宽度：420px（桌面端）</li>
            <li>• 主色调：Indigo (#4F46E5)</li>
            <li>• 背景：渐变紫色</li>
            <li>• 卡片：毛玻璃效果</li>
            <li>• 圆角：16px（卡片）</li>
            <li>• 输入框高度：44px</li>
            <li>• 按钮高度：44px</li>
        </ul>
    </div>
</body>
</html>
